<html lang="ko">
<head>

  <meta name="theme-color" content="#FAF8F2" />

  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><defs><radialGradient id='a' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='rgb(245,212,181)' stop-opacity='0.9'/><stop offset='55%25' stop-color='rgb(201,149,106)' stop-opacity='0.45'/><stop offset='100%25' stop-color='rgb(201,149,106)' stop-opacity='0'/></radialGradient><radialGradient id='b' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='rgb(201,227,206)' stop-opacity='0.9'/><stop offset='55%25' stop-color='rgb(130,176,140)' stop-opacity='0.45'/><stop offset='100%25' stop-color='rgb(130,176,140)' stop-opacity='0'/></radialGradient></defs><rect width='192' height='192' rx='42' fill='%23FAF8F2'/><circle cx='80' cy='90' r='62' fill='url(%23a)'/><circle cx='118' cy='110' r='62' fill='url(%23b)'/></svg>" />

  <title>감각 일기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />

  <style>
    /* ---------- Base ---------- */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #FAF8F2;
    }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #5C4631;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* paper grain texture — very faint crosshatch, just enough to be felt */
      background-color: #FAF8F2;
      background-image:
        repeating-linear-gradient(
          45deg,
          rgba(120, 95, 65, 0.012) 0 1px,
          transparent 1px 6px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(120, 95, 65, 0.010) 0 1px,
          transparent 1px 8px
        );
    }

    .app {
      width: 100%;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ---------- View toggle ---------- */
    .view {
      display: none;
      flex: 1;
      flex-direction: column;
      height: 100%;
    }
    .view.active {
      display: flex;
    }

    /* ---------- Soft divider (faded ends) ---------- */
    .divider {
      width: 70%;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent 0%,
        rgba(92, 70, 49, 0.25) 35%,
        rgba(92, 70, 49, 0.25) 65%,
        transparent 100%
      );
      margin: 0 auto;
    }

    /* ===================================================== */
    /* Screen 1: Home (sense selection)                       */
    /* ===================================================== */

    #view-home {
      padding: 0;
    }

    .home-header {
      padding: 32px 28px 6px;
      text-align: center;
      position: relative;
    }
    .link-journal {
      position: absolute;
      top: 22px;
      right: 22px;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      color: #9C8770;
      background: transparent;
      border: none;
      cursor: pointer;
      letter-spacing: 1.5px;
      padding: 6px 4px;
      transition: color 0.2s ease;
    }
    .link-journal:active { color: #5C4631; }
    .home-date {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 400;
      font-size: 13px;
      color: #9C8770;
      letter-spacing: 0.6px;
      margin-bottom: 16px;
    }
    .home-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 21px;
      color: #5C4631;
      line-height: 1.55;
      margin: 0;
      letter-spacing: 0.3px;
    }

    .home-stage {
      flex: 1;
      position: relative;
      min-height: 480px;
      margin: 4px 0 0;
    }

    /* Outer container — only handles position, size, animation, tap.
       Each sense gets its own drift keyframe so the five circles don't
       breathe in unison; they each wander on their own little path. */
    .sense-circle {
      position: absolute;
      width: 140px;
      height: 140px;
      cursor: pointer;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      transition: transform 0.25s ease;
    }
    .sense-circle:active {
      transform: scale(0.96);
    }

    /* The painted blob — perfectly round, just diluted pigment on paper.
       No outer halo, no ring on top: selection is expressed purely as
       "faint → vivid" by lifting opacity + saturation together. */
    .sense-blob {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.45;
      filter: saturate(0.8);
      mix-blend-mode: multiply;
      transition: opacity 0.55s ease, filter 0.55s ease;
    }
    .sense-circle.selected .sense-blob {
      opacity: 1;
      filter: saturate(1.1);
    }

    /* Five independent drift paths — different shapes, different speeds.
       Together they read as colors floating freely on wet paper. */
    @keyframes drift-1 {
      0%, 100% { translate: 0 0; }
      25%      { translate:  5px -3px; }
      50%      { translate:  2px -7px; }
      75%      { translate: -3px -4px; }
    }
    @keyframes drift-2 {
      0%, 100% { translate: 0 0; }
      30%      { translate: -5px -2px; }
      60%      { translate: -3px -6px; }
      80%      { translate:  2px -3px; }
    }
    @keyframes drift-3 {
      0%, 100% { translate: 0 0; }
      20%      { translate:  3px  2px; }
      45%      { translate:  6px -2px; }
      70%      { translate:  4px -6px; }
      90%      { translate: -1px -3px; }
    }
    @keyframes drift-4 {
      0%, 100% { translate: 0 0; }
      33%      { translate: -4px  3px; }
      66%      { translate: -6px -2px; }
      85%      { translate: -2px -5px; }
    }
    @keyframes drift-5 {
      0%, 100% { translate: 0 0; }
      25%      { translate:  2px  4px; }
      50%      { translate:  5px  1px; }
      75%      { translate:  3px -4px; }
    }

    /* ---- Per-sense color tokens & position ----
       --core / --mid / --edge are RGB triples so every gradient stop can
       carry an alpha — that's what makes the whole shape look diluted
       instead of just the rim. */

    /* Positions are deliberately uneven and slightly overlapping —
       the watercolor blobs are set to multiply-blend, so where two circles
       brush against each other their colors mingle into a third hue,
       like real wet pigment on paper. */
    .sense-sight {
      --core: 245, 212, 181;
      --mid:  232, 182, 140;
      --edge: 201, 149, 106;
      top: 8%;  left: 22%;
      animation-name: drift-1; animation-duration: 9s;
    }
    .sense-hearing {
      --core: 201, 227, 206;
      --mid:  168, 207, 176;
      --edge: 130, 176, 140;
      top: 18%; right: 10%;
      animation-name: drift-2; animation-duration: 11s;
    }
    .sense-smell {
      --core: 219, 202, 227;
      --mid:  197, 176, 208;
      --edge: 160, 136, 176;
      top: 32%; left: 12%;
      animation-name: drift-3; animation-duration: 8.5s;
    }
    .sense-taste {
      --core: 242, 182, 175;
      --mid:  232, 152, 144;
      --edge: 201, 112, 106;
      top: 46%; right: 6%;
      animation-name: drift-4; animation-duration: 10s;
    }
    .sense-touch {
      --core: 224, 204, 168;
      --mid:  205, 179, 135;
      --edge: 168, 142, 102;
      top: 56%; left: 18%;
      animation-name: drift-5; animation-duration: 12s;
    }

    /* Diluted watercolor: every stop carries low alpha so cream paper shows
       through, last stop hits 0 alpha so the edge melts into paper.
       No box-shadow halo — anything beyond this gradient was reading as a
       second faint ring around the circle. */
    .sense-blob {
      background: radial-gradient(circle at 38% 32%,
        rgba(var(--core), 0.82) 0%,
        rgba(var(--mid),  0.66) 32%,
        rgba(var(--edge), 0.42) 60%,
        rgba(var(--edge), 0.18) 84%,
        rgba(var(--edge), 0)    100%);
    }

    /* Label — drawn outside the filtered subtree so it stays crisp */
    .sense-label {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 16px;
      pointer-events: none;
      letter-spacing: 1.4px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
      z-index: 2;
    }
    .sense-sight   .sense-label { color: #6B3A1E; }
    .sense-hearing .sense-label { color: #2E5C3A; }
    .sense-smell   .sense-label { color: #4A2E5C; }
    .sense-taste   .sense-label { color: #6B2E2A; }
    .sense-touch   .sense-label { color: #5C4218; }

    /* Home footer */
    .home-footer {
      padding: 8px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .home-counter {
      font-size: 13px;
      color: #9C8770;
      letter-spacing: 0.4px;
      font-family: 'Noto Serif KR', Georgia, serif;
    }
    .btn-next {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 16px;
      padding: 12px 40px;
      color: #5C4631;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.2);
      border-radius: 999px;
      box-shadow:
        0 1px 2px rgba(92, 70, 49, 0.08),
        0 4px 14px rgba(92, 70, 49, 0.06);
      cursor: pointer;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.2s ease;
      letter-spacing: 1px;
    }
    .btn-next.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .btn-next:active {
      transform: scale(0.97);
    }

    /* ===================================================== */
    /* Screen 2: Input (photo + one line)                     */
    /* ===================================================== */

    .input-header {
      padding: 28px 28px 4px;
      text-align: center;
    }
    .picked-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 14px;
      margin-bottom: 8px;
    }
    .picked-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
      box-shadow: inset 0 0 3px rgba(255, 255, 255, 0.25);
    }
    .picked-dot.sight   { background: radial-gradient(circle at 35% 35%, #F0CCAB, #E8B68C); }
    .picked-dot.hearing { background: radial-gradient(circle at 35% 35%, #BFDBC6, #A8CFB0); }
    .picked-dot.smell   { background: radial-gradient(circle at 35% 35%, #D2C2DC, #C5B0D0); }
    .picked-dot.taste   { background: radial-gradient(circle at 35% 35%, #F1AEA7, #E89890); }
    .picked-dot.touch   { background: radial-gradient(circle at 35% 35%, #D9C49F, #CDB387); }

    .picked-names {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      color: #9C8770;
      letter-spacing: 1.2px;
    }

    .input-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 19px;
      color: #5C4631;
      text-align: center;
      margin: 18px 0 22px;
      letter-spacing: 0.5px;
    }

    .input-body {
      flex: 1;
      padding: 0 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .photo-frame {
      position: relative;
      width: 100%;
      max-width: 230px;
      aspect-ratio: 1 / 1;
      margin: 0 auto 16px;
      border-radius: 6px;
      border: 1.4px dashed rgba(92, 70, 49, 0.28);
      background: rgba(251, 247, 238, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .photo-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .photo-frame.has-photo .photo-preview { display: block; }
    .photo-frame.has-photo .photo-empty   { display: none; }
    .photo-frame.has-photo .photo-remove  { display: flex; }

    .photo-empty {
      color: #B5A38B;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      text-align: center;
      padding: 16px 20px;
      letter-spacing: 0.5px;
      line-height: 1.6;
    }
    .photo-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(250, 248, 242, 0.92);
      border: 1px solid rgba(92, 70, 49, 0.18);
      color: #5C4631;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 1;
    }

    .photo-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 26px;
    }
    .photo-btn {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      padding: 9px 26px;
      color: #5C4631;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.2);
      border-radius: 999px;
      cursor: pointer;
      display: inline-block;
      letter-spacing: 1.2px;
      user-select: none;
      transition: transform 0.2s ease;
      box-shadow:
        0 1px 2px rgba(92, 70, 49, 0.06),
        0 3px 10px rgba(92, 70, 49, 0.04);
    }
    .photo-btn:active { transform: scale(0.96); }

    .text-line {
      width: 100%;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 17px;
      color: #5C4631;
      background: transparent;
      border: none;
      border-bottom: 1.4px dashed rgba(92, 70, 49, 0.28);
      padding: 12px 4px;
      outline: none;
      text-align: center;
      letter-spacing: 0.3px;
      margin: 4px 0 12px;
    }
    .text-line::placeholder {
      color: #BFAE96;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .input-footer {
      padding: 12px 28px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .btn-back {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 15px;
      color: #9C8770;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 4px;
      letter-spacing: 1.5px;
    }
    .btn-back:active { color: #5C4631; }

    .btn-save {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 16px;
      padding: 12px 32px;
      color: #5C4631;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.2);
      border-radius: 999px;
      box-shadow:
        0 1px 2px rgba(92, 70, 49, 0.08),
        0 4px 14px rgba(92, 70, 49, 0.06);
      cursor: pointer;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.2s ease;
      letter-spacing: 1.2px;
    }
    .btn-save.enabled {
      opacity: 1;
      pointer-events: auto;
    }
    .btn-save:active { transform: scale(0.97); }

    /* ===================================================== */
    /* Screen 3: Done                                         */
    /* ===================================================== */

    #view-done {
      padding: 0;
    }

    .done-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px 20px;
    }

    .done-cluster {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: 36px;
    }

    .blend-circle {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      mix-blend-mode: multiply;
      display: none;
      background: radial-gradient(circle at 38% 32%,
        rgba(var(--c1), 0.82) 0%,
        rgba(var(--c2), 0.66) 32%,
        rgba(var(--e),  0.42) 60%,
        rgba(var(--e),  0.18) 84%,
        rgba(var(--e),  0)    100%);
    }
    .blend-circle.show { display: block; }

    .blend-circle[data-sense="sight"]   {
      --c1: 245, 212, 181; --c2: 232, 182, 140; --e: 201, 149, 106;
      top: 30px;  left: 30px;
    }
    .blend-circle[data-sense="hearing"] {
      --c1: 201, 227, 206; --c2: 168, 207, 176; --e: 130, 176, 140;
      top: 30px;  left: 80px;
    }
    .blend-circle[data-sense="smell"]   {
      --c1: 219, 202, 227; --c2: 197, 176, 208; --e: 160, 136, 176;
      top: 60px;  left: 20px;
    }
    .blend-circle[data-sense="taste"]   {
      --c1: 242, 182, 175; --c2: 232, 152, 144; --e: 201, 112, 106;
      top: 60px;  left: 90px;
    }
    .blend-circle[data-sense="touch"]   {
      --c1: 224, 204, 168; --c2: 205, 179, 135; --e: 168, 142, 102;
      top: 90px;  left: 55px;
    }

    .done-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 22px;
      color: #5C4631;
      margin: 0 0 8px;
      letter-spacing: 0.4px;
    }
    .done-sub {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      color: #9C8770;
      margin: 0;
      letter-spacing: 0.8px;
    }

    .done-footer {
      padding: 16px 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .btn-secondary {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 15px;
      color: #9C8770;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 10px 8px;
      letter-spacing: 1.4px;
    }
    .btn-secondary:active { color: #5C4631; }

    .btn-primary {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 16px;
      padding: 12px 28px;
      color: #5C4631;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.2);
      border-radius: 999px;
      box-shadow:
        0 1px 2px rgba(92, 70, 49, 0.08),
        0 4px 14px rgba(92, 70, 49, 0.06);
      cursor: pointer;
      transition: transform 0.2s ease;
      letter-spacing: 1.2px;
    }
    .btn-primary:active { transform: scale(0.97); }

    /* ===================================================== */
    /* Screen 4: Journal                                      */
    /* ===================================================== */

    .journal-header {
      padding: 30px 28px 8px;
      text-align: center;
      flex-shrink: 0;
      position: relative;
    }
    .journal-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 20px;
      color: #5C4631;
      margin: 0 0 14px;
      letter-spacing: 0.5px;
    }
    .journal-tabs {
      display: inline-flex;
      gap: 18px;
      padding: 4px 0 10px;
    }
    .journal-tabs .tab {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      color: #9C8770;
      background: transparent;
      border: none;
      padding: 4px 6px;
      cursor: pointer;
      letter-spacing: 1.4px;
      position: relative;
    }
    .journal-tabs .tab.active {
      color: #5C4631;
    }
    .journal-tabs .tab.active::after {
      content: '';
      position: absolute;
      left: 10%; right: 10%;
      bottom: -4px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(92, 70, 49, 0.4), transparent);
    }
    .journal-tabs .tab.disabled {
      color: #C9BDAB;
      cursor: not-allowed;
    }

    .journal-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 22px 16px;
    }

    .entry-empty {
      text-align: center;
      font-family: 'Noto Serif KR', Georgia, serif;
      color: #9C8770;
      font-size: 14px;
      margin-top: 64px;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }

    .entry-card {
      position: relative;
      padding: 22px 6px 26px;
    }
    .entry-card::after {
      content: '';
      position: absolute;
      left: 12%; right: 12%;
      bottom: 0;
      height: 1px;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(92, 70, 49, 0.2) 40%,
        rgba(92, 70, 49, 0.2) 60%,
        transparent 100%);
    }
    .entry-card:last-child::after { display: none; }

    .entry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .entry-time {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #9C8770;
      letter-spacing: 0.8px;
    }
    .entry-dots {
      display: inline-flex;
      gap: 5px;
    }
    .entry-dots .picked-dot {
      width: 9px;
      height: 9px;
    }

    .entry-photo {
      width: 100%;
      max-height: 340px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      margin-bottom: 14px;
    }

    .entry-text {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 17px;
      color: #5C4631;
      line-height: 1.6;
      margin: 0;
      letter-spacing: 0.3px;
    }

    .entry-delete {
      display: block;
      margin-left: auto;
      margin-top: 12px;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #B5A38B;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 2px;
      letter-spacing: 1.2px;
      transition: color 0.2s ease;
    }
    .entry-delete:active,
    .entry-delete:hover { color: #6B5340; }

    /* ----- Calendar tab ----- */
    /* Calendar mode pulls journal-body padding in so each cell can breathe. */
    .journal-body.mode-calendar {
      padding: 4px 0 16px;
    }

    .calendar-view {
      padding: 6px 0 12px;
    }

    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 10px 14px;
    }
    .cal-month-label {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 15px;
      color: #5C4631;
      letter-spacing: 1px;
    }
    .cal-arrow {
      font-family: 'Noto Serif KR', Georgia, serif;
      background: transparent;
      border: none;
      color: #9C8770;
      font-size: 18px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      border-radius: 50%;
      padding: 0;
      line-height: 1;
    }
    .cal-arrow:active { background: rgba(92, 70, 49, 0.06); }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 11px;
      color: #B5A38B;
      letter-spacing: 0.6px;
      padding: 0 4px 6px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 0 4px;
    }

    /* Cell = simple block: number on top, square thumb below.
       Block layout (not flex) so the empty thumb's padding-bottom:100%
       reliably stretches to a square in every browser. */
    .cal-cell {
      display: block;
      width: 100%;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      padding: 0;
      text-align: center;
      outline: 1.5px solid transparent;
      outline-offset: -2px;
      transition: outline-color 0.2s ease, background 0.15s ease;
    }
    .cal-cell:focus { outline-color: transparent; }
    .cal-cell.outside { cursor: default; }

    .cal-num {
      display: block;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #5C4631;
      padding: 5px 0 4px;
      line-height: 1;
      letter-spacing: 0.2px;
    }
    .cal-cell.outside .cal-num { color: #D5C8B5; }
    .cal-cell.today .cal-num { font-weight: 600; }

    /* Square thumb via padding-bottom trick — works for empty thumbs too
       so every cell (including blank days) is the same size. */
    .cal-thumb {
      display: block;
      width: 100%;
      height: 0;
      padding-bottom: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }
    .cal-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cal-cell:not(.outside):active { background: rgba(92, 70, 49, 0.05); }
    .cal-cell.selected:not(.outside) {
      outline-color: rgba(92, 70, 49, 0.45);
    }

    /* Watercolor blob backgrounds for entries without a photo */
    .cal-thumb.blob-sight {
      background: radial-gradient(circle at 38% 32%,
        rgba(245, 212, 181, 0.72) 0%,
        rgba(232, 182, 140, 0.56) 30%,
        rgba(201, 149, 106, 0.32) 65%,
        rgba(201, 149, 106, 0.12) 88%,
        rgba(201, 149, 106, 0)    100%);
    }
    .cal-thumb.blob-hearing {
      background: radial-gradient(circle at 38% 32%,
        rgba(201, 227, 206, 0.72) 0%,
        rgba(168, 207, 176, 0.56) 30%,
        rgba(130, 176, 140, 0.32) 65%,
        rgba(130, 176, 140, 0.12) 88%,
        rgba(130, 176, 140, 0)    100%);
    }
    .cal-thumb.blob-smell {
      background: radial-gradient(circle at 38% 32%,
        rgba(219, 202, 227, 0.72) 0%,
        rgba(197, 176, 208, 0.56) 30%,
        rgba(160, 136, 176, 0.32) 65%,
        rgba(160, 136, 176, 0.12) 88%,
        rgba(160, 136, 176, 0)    100%);
    }
    .cal-thumb.blob-taste {
      background: radial-gradient(circle at 38% 32%,
        rgba(242, 182, 175, 0.72) 0%,
        rgba(232, 152, 144, 0.56) 30%,
        rgba(201, 112, 106, 0.32) 65%,
        rgba(201, 112, 106, 0.12) 88%,
        rgba(201, 112, 106, 0)    100%);
    }
    .cal-thumb.blob-touch {
      background: radial-gradient(circle at 38% 32%,
        rgba(224, 204, 168, 0.72) 0%,
        rgba(205, 179, 135, 0.56) 30%,
        rgba(168, 142, 102, 0.32) 65%,
        rgba(168, 142, 102, 0.12) 88%,
        rgba(168, 142, 102, 0)    100%);
    }

    .cal-day-entries {
      margin-top: 18px;
    }
    .cal-day-header {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      color: #9C8770;
      letter-spacing: 1px;
      text-align: center;
      padding: 8px 0 4px;
      position: relative;
    }
    .cal-day-header::after {
      content: '';
      display: block;
      width: 40%;
      height: 1px;
      margin: 8px auto 4px;
      background: linear-gradient(to right, transparent, rgba(92, 70, 49, 0.2), transparent);
    }
    .cal-no-entries {
      text-align: center;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      color: #B5A38B;
      padding: 20px;
      letter-spacing: 0.5px;
    }

    .bottom-nav {
      display: flex;
      border-top: 1px solid rgba(92, 70, 49, 0.12);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom);
      background: rgba(250, 248, 242, 0.85);
    }
    .nav-btn {
      flex: 1;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      color: #B5A38B;
      background: transparent;
      border: none;
      padding: 16px 0;
      cursor: pointer;
      letter-spacing: 2px;
    }
    .nav-btn.active {
      color: #5C4631;
    }
    .nav-btn:active {
      background: rgba(92, 70, 49, 0.04);
    }

    /* ===================================================== */
    /* Settings modal                                         */
    /* ===================================================== */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(250, 248, 242, 0.86);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 24px;
      backdrop-filter: blur(2px);
    }
    .settings-overlay[hidden] { display: none; }

    .settings-modal {
      position: relative;
      width: 100%;
      max-width: 340px;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.18);
      border-radius: 10px;
      padding: 26px 24px 22px;
      box-shadow:
        0 2px 6px rgba(92, 70, 49, 0.08),
        0 10px 30px rgba(92, 70, 49, 0.10);
    }
    .settings-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 17px;
      color: #5C4631;
      margin: 0 0 14px;
      letter-spacing: 0.6px;
    }
    .settings-label {
      display: block;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #9C8770;
      letter-spacing: 0.8px;
      margin: 4px 0 6px;
    }
    .settings-input {
      width: 100%;
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      font-size: 14px;
      color: #5C4631;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(92, 70, 49, 0.22);
      border-radius: 6px;
      padding: 10px 12px;
      outline: none;
      letter-spacing: 0.2px;
    }
    .settings-input:focus {
      border-color: rgba(92, 70, 49, 0.45);
    }
    .settings-link {
      display: inline-block;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #9C8770;
      text-decoration: none;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }
    .settings-link:active { color: #5C4631; }
    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }
    .settings-btn-ghost,
    .settings-btn-primary {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      padding: 9px 18px;
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.2s ease;
    }
    .settings-btn-ghost {
      color: #9C8770;
      background: transparent;
      border: 1px solid rgba(92, 70, 49, 0.16);
    }
    .settings-btn-primary {
      color: #5C4631;
      background: #F3EFE7;
      border: 1px solid rgba(92, 70, 49, 0.22);
      box-shadow: 0 1px 2px rgba(92, 70, 49, 0.06);
    }
    .settings-btn-primary:active,
    .settings-btn-ghost:active { transform: scale(0.97); }
    .settings-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #9C8770;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
    }
    .settings-close:active { color: #5C4631; }

    /* Settings ⚙ button in Journal header */
    .btn-settings {
      position: absolute;
      top: 26px;
      right: 22px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: transparent;
      border: none;
      color: #9C8770;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .btn-settings:active { color: #5C4631; }

    /* ===================================================== */
    /* Diary tab                                              */
    /* ===================================================== */
    .diary-view {
      padding: 6px 4px 12px;
    }

    .diary-card {
      position: relative;
      padding: 22px 14px 26px;
    }
    .diary-card::after {
      content: '';
      position: absolute;
      left: 12%; right: 12%;
      bottom: 0;
      height: 1px;
      background: linear-gradient(to right,
        transparent 0%,
        rgba(92, 70, 49, 0.2) 40%,
        rgba(92, 70, 49, 0.2) 60%,
        transparent 100%);
    }
    .diary-card:last-child::after { display: none; }

    .diary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .diary-date {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      color: #9C8770;
      letter-spacing: 0.8px;
    }
    .diary-senses {
      display: inline-flex;
      gap: 5px;
    }
    .diary-senses .picked-dot {
      width: 9px;
      height: 9px;
    }

    .diary-body {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 16px;
      color: #5C4631;
      line-height: 1.8;
      letter-spacing: 0.3px;
      margin: 0;
      white-space: pre-wrap;
    }

    .diary-rewrite {
      display: block;
      margin-left: auto;
      margin-top: 14px;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #B5A38B;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 2px;
      letter-spacing: 1.2px;
    }
    .diary-rewrite:active { color: #6B5340; }

    .diary-empty {
      text-align: center;
      font-family: 'Noto Serif KR', Georgia, serif;
      color: #9C8770;
      font-size: 14px;
      margin-top: 40px;
      letter-spacing: 0.5px;
      line-height: 1.8;
    }

    .diary-today-action {
      text-align: center;
      padding: 32px 16px 24px;
    }
    .diary-today-action .btn-primary {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 15px;
      padding: 12px 28px;
      color: #5C4631;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.2);
      border-radius: 999px;
      cursor: pointer;
      letter-spacing: 1.2px;
      box-shadow:
        0 1px 2px rgba(92, 70, 49, 0.08),
        0 4px 14px rgba(92, 70, 49, 0.06);
    }
    .diary-today-action .btn-primary:active { transform: scale(0.97); }
    .diary-today-action .btn-primary[disabled] {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }
    .diary-today-hint {
      margin-top: 10px;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 12px;
      color: #B5A38B;
      letter-spacing: 0.5px;
    }

    /* ===================================================== */
    /* Month summary card                                     */
    /* ===================================================== */
    .month-summary {
      margin: 6px 14px 14px;
      padding: 14px 16px 14px;
      border-radius: 8px;
      background: rgba(251, 247, 238, 0.65);
      border: 1px solid rgba(92, 70, 49, 0.12);
    }
    .month-summary[hidden] { display: none; }

    .month-summary-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      color: #9C8770;
      letter-spacing: 1.4px;
      margin-bottom: 8px;
    }

    .month-summary-senses {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }
    .month-summary-senses .ms-sense {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      color: #5C4631;
      letter-spacing: 0.4px;
    }
    .month-summary-senses .picked-dot {
      width: 9px;
      height: 9px;
    }

    .month-summary-keywords {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 13px;
      color: #5C4631;
      letter-spacing: 1px;
      margin-top: 6px;
      min-height: 18px;
    }
    .month-summary-keywords:empty { display: none; }

    .month-summary-oneline {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 14px;
      color: #5C4631;
      letter-spacing: 0.4px;
      margin-top: 6px;
      line-height: 1.6;
      min-height: 22px;
    }
    .month-summary-oneline:empty { display: none; }

    /* === Input header sense-picker panel === */

    /* picked-toggle: 헤더 영역 자체가 탭 가능한 버튼 — 기본 버튼 스타일 제거 */
    .picked-toggle {
      display: block;
      width: 100%;
      padding: 0;
      background: transparent;
      border: 0;
      cursor: pointer;
      text-align: inherit;
      font: inherit;
      color: inherit;
    }
    .picked-toggle:focus-visible {
      outline: 2px solid rgba(92, 70, 49, 0.25);
      outline-offset: 4px;
      border-radius: 6px;
    }

    /* sense-picker 펼침 패널 — 기본 닫힘, .open 클래스로 열림 */
    .sense-picker {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.28s ease-out, opacity 0.2s ease-out, margin-top 0.28s ease-out;
      margin-top: 0;
    }
    .sense-picker[hidden] { display: none; }
    .sense-picker.open {
      max-height: 360px;
      opacity: 1;
      margin-top: 14px;
    }

    .sense-picker-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sense-picker-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      cursor: pointer;
      border-radius: 8px;
      opacity: 0.45;
      filter: saturate(0.8);
      transition: opacity 0.2s ease, filter 0.2s ease;
    }
    .sense-picker-item.selected {
      opacity: 1;
      filter: saturate(1.1);
    }

    /* sense-picker용 색 변수 — 홈 5감 동그라미와 동일 값 (코드에서 직접 복사) */
    .sense-picker-item.sense-sight {
      --core: 245, 212, 181; --mid: 232, 182, 140; --edge: 201, 149, 106;
    }
    .sense-picker-item.sense-hearing {
      --core: 201, 227, 206; --mid: 168, 207, 176; --edge: 130, 176, 140;
    }
    .sense-picker-item.sense-smell {
      --core: 219, 202, 227; --mid: 197, 176, 208; --edge: 160, 136, 176;
    }
    .sense-picker-item.sense-taste {
      --core: 242, 182, 175; --mid: 232, 152, 144; --edge: 201, 112, 106;
    }
    .sense-picker-item.sense-touch {
      --core: 224, 204, 168; --mid: 205, 179, 135; --edge: 168, 142, 102;
    }

    /* 작은 동그라미 30px — 홈 .sense-blob과 동일한 radial-gradient 톤 */
    .sense-picker-blob {
      flex: 0 0 30px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%,
        rgba(var(--core), 0.82) 0%,
        rgba(var(--mid),  0.66) 32%,
        rgba(var(--edge), 0.42) 60%,
        rgba(var(--edge), 0.18) 84%,
        rgba(var(--edge), 0)    100%);
    }

    .sense-picker-label {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.8px;
    }
    .sense-picker-item.sense-sight   .sense-picker-label { color: #6B3A1E; }
    .sense-picker-item.sense-hearing .sense-picker-label { color: #2E5C3A; }
    .sense-picker-item.sense-smell   .sense-picker-label { color: #4A2E5C; }
    .sense-picker-item.sense-taste   .sense-picker-label { color: #6B2E2A; }
    .sense-picker-item.sense-touch   .sense-picker-label { color: #5C4218; }

    /* 확인 버튼 — 홈 .btn-next와 같은 톤 */
    .sense-picker-confirm {
      display: block;
      margin: 14px auto 4px;
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 500;
      font-size: 15px;
      padding: 10px 32px;
      color: #5C4631;
      background: #FBF7EE;
      border: 1px solid rgba(92, 70, 49, 0.2);
      border-radius: 999px;
      box-shadow:
        0 1px 2px rgba(92, 70, 49, 0.08),
        0 4px 14px rgba(92, 70, 49, 0.06);
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.25s ease;
      opacity: 1;
    }
    .sense-picker-confirm.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    /* input-body dim — 펼친 동안 본문이 한지에 살짝 가라앉음 */
    .input-body {
      transition: opacity 0.25s ease;
    }
    .input-body.dim {
      opacity: 0.35;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- ===== Screen 1: Home ===== -->
    <section class="view active" id="view-home">
      <header class="home-header">
        <button class="link-journal" id="link-journal" type="button">일기 ›</button>
        <div class="home-date" id="home-date"></div>
        <h1 class="home-title">어떤 감각을 기록하고 싶나요?</h1>
      </header>

      <div class="home-stage" id="home-stage">
        <div class="sense-circle sense-sight"   data-sense="sight"  ><div class="sense-blob"></div><span class="sense-label">시각</span></div>
        <div class="sense-circle sense-hearing" data-sense="hearing"><div class="sense-blob"></div><span class="sense-label">청각</span></div>
        <div class="sense-circle sense-smell"   data-sense="smell"  ><div class="sense-blob"></div><span class="sense-label">후각</span></div>
        <div class="sense-circle sense-taste"   data-sense="taste"  ><div class="sense-blob"></div><span class="sense-label">미각</span></div>
        <div class="sense-circle sense-touch"   data-sense="touch"  ><div class="sense-blob"></div><span class="sense-label">촉감</span></div>
      </div>

    <!-- Settings modal -->
    <div class="settings-overlay" id="settings-overlay" hidden>
      <div class="settings-modal" role="dialog" aria-label="AI 설정">
