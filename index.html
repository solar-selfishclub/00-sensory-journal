  </div>

  <script>
    'use strict';

    // ---------- State ----------
    const state = {
      selectedSenses: new Set(),
      photoBlob: null,
      text: ''
    };

    const SENSE_LABELS = {
      sight: '시각', hearing: '청각', smell: '후각', taste: '미각', touch: '촉감'
    };

    // ---------- View routing ----------
    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
    }

    // ---------- IndexedDB ----------
    const DB_NAME = 'sensory-journal';
    const DB_VERSION = 2;
    const STORE = 'entries';
    const STORE_DIARIES = 'daily_diaries';
    const STORE_MONTH = 'month_summaries';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(STORE)) {
            const store = db.createObjectStore(STORE, { keyPath: 'id' });
            store.createIndex('createdAt', 'createdAt');
          }
          if (!db.objectStoreNames.contains(STORE_DIARIES)) {
            db.createObjectStore(STORE_DIARIES, { keyPath: 'dateKey' });
          }
          if (!db.objectStoreNames.contains(STORE_MONTH)) {
            db.createObjectStore(STORE_MONTH, { keyPath: 'monthKey' });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
      });
    }

    async function addEntry(entry) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).add(entry);
        tx.oncomplete = () => resolve();
        tx.onerror    = () => reject(tx.error);
      });
    }

    async function getAllEntries() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readonly');
        const req = tx.objectStore(STORE).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror   = () => reject(req.error);
      });
    }

    async function getDiary(dateKey) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_DIARIES, 'readonly');
        const req = tx.objectStore(STORE_DIARIES).get(dateKey);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror   = () => reject(req.error);
      });
    }

    async function putDiary(diary) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_DIARIES, 'readwrite');
        tx.objectStore(STORE_DIARIES).put(diary);
        tx.oncomplete = () => resolve();
        tx.onerror    = () => reject(tx.error);
      });
    }

    async function getAllDiaries() {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_DIARIES, 'readonly');
        const req = tx.objectStore(STORE_DIARIES).getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror   = () => reject(req.error);
      });
    }

    async function getMonthSummary(monthKey) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_MONTH, 'readonly');
        const req = tx.objectStore(STORE_MONTH).get(monthKey);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror   = () => reject(req.error);
      });
    }

    async function putMonthSummary(summary) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_MONTH, 'readwrite');
        tx.objectStore(STORE_MONTH).put(summary);
        tx.oncomplete = () => resolve();
        tx.onerror    = () => reject(tx.error);
      });
    }

    // Hash entries list (id + text) into a short fingerprint.
    // Photo blobs are intentionally excluded — text is the only AI input.
    async function fingerprintEntries(entries) {
      const sorted = entries.slice().sort((a, b) => a.id - b.id);
      const joined = sorted.map(e => `${e.id}:${e.text || ''}`).join('|');
      const buf = new TextEncoder().encode(joined);
      const hashBuf = await crypto.subtle.digest('SHA-1', buf);
      const bytes = Array.from(new Uint8Array(hashBuf));
      return bytes.map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
    }

    // ---------- Gemini API ----------
    const GEMINI_MODEL = 'gemini-2.5-flash';
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

    function getApiKey() {
      const k = (localStorage.getItem('geminiApiKey') || '').trim();
      return k || null;
    }

    async function callGemini(systemText, userText) {
      const key = getApiKey();
      if (!key) {
        const e = new Error('API key not set');
        e.code = 'NO_KEY';
        throw e;
      }

      const url = `${GEMINI_URL}?key=${encodeURIComponent(key)}`;
      const body = {
        systemInstruction: { parts: [{ text: systemText }] },
        contents: [{ role: 'user', parts: [{ text: userText }] }]
      };

      let res;
      try {
        res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
      } catch (networkErr) {
        const e = new Error('Network failed');
        e.code = 'NETWORK';
        throw e;
      }

      if (res.status === 429) {
        const e = new Error('Rate limit');
        e.code = 'RATE_LIMIT';
        throw e;
      }
      if (res.status === 401 || res.status === 403) {
        const e = new Error('Auth failed');
        e.code = 'AUTH';
        throw e;
      }
      if (!res.ok) {
        const e = new Error(`HTTP ${res.status}`);
        e.code = 'HTTP';
        throw e;
      }

      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text ?? '';
      if (!text) {
        const e = new Error('Empty response');
        e.code = 'EMPTY';
        throw e;
      }
      return text;
    }

    function geminiErrorMessage(err) {
      switch (err && err.code) {
        case 'NO_KEY':     return '먼저 ⚙ 에서 API 키를 입력해주세요.';
        case 'NETWORK':    return '연결이 잠시 끊겼어요. 다시 시도해주세요.';
        case 'RATE_LIMIT': return '오늘 무료 한도가 다 찼어요. 내일 다시 시도해주세요.';
        case 'AUTH':       return 'API 키가 올바르지 않은 것 같아요. ⚙ 에서 확인해주세요.';
        case 'EMPTY':      return '응답이 비어 있어요. 잠시 후 다시 시도해주세요.';
        default:           return '지금은 일기를 못 만들었어요. 잠시 후 다시 시도해주세요.';
      }
    }

    // ---------- Settings modal ----------
    function openSettingsModal() {
      const overlay = document.getElementById('settings-overlay');
      const input   = document.getElementById('settings-key');
      input.value = localStorage.getItem('geminiApiKey') || '';
      overlay.hidden = false;
      setTimeout(() => input.focus(), 50);
    }

    function closeSettingsModal() {
      document.getElementById('settings-overlay').hidden = true;
    }

    function saveApiKey() {
      const val = document.getElementById('settings-key').value.trim();
      if (val) {
        localStorage.setItem('geminiApiKey', val);
      } else {
        localStorage.removeItem('geminiApiKey');
      }
      closeSettingsModal();
    }

    function clearApiKey() {
      if (!confirm('저장된 API 키를 지울까요?')) return;
      localStorage.removeItem('geminiApiKey');
      document.getElementById('settings-key').value = '';
      closeSettingsModal();
    }

    function startOfTodayMs() {
      const d = new Date();
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    async function getTodayCount() {
      const all = await getAllEntries();
      const start = startOfTodayMs();
      return all.filter(e => new Date(e.createdAt).getTime() >= start).length;
    }

    // ---------- Date ----------
    function renderDate() {
      const d = new Date();
      const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      const days   = ['일','월','화','수','목','금','토'];
      const txt = `${d.getFullYear()}년 ${months[d.getMonth()]} ${d.getDate()}일 ${days[d.getDay()]}요일`;
      document.getElementById('home-date').textContent = txt;
    }

    // ---------- Sense toggle ----------
    function toggleSense(sense, el) {
      if (state.selectedSenses.has(sense)) {
        state.selectedSenses.delete(sense);
        el.classList.remove('selected');
      } else {
        state.selectedSenses.add(sense);
        el.classList.add('selected');
      }
      updateHomeFooter();
    }

    function updateHomeFooter() {
      const n = state.selectedSenses.size;
      const counter = document.getElementById('home-counter');
      const btn = document.getElementById('btn-next');
      if (n === 0) {
        counter.textContent = '감각을 골라주세요';
        btn.classList.remove('enabled');
      } else {
        counter.textContent = `${n}개 선택됨 · 중복 가능`;
        btn.classList.add('enabled');
      }
    }

    // ---------- Screen 2 helpers ----------
    function renderPicked() {
      const dotsEl  = document.getElementById('picked-dots');
      const namesEl = document.getElementById('picked-names');
      dotsEl.innerHTML = '';
      const picked = [...state.selectedSenses];
      picked.forEach(s => {
        const d = document.createElement('span');
        d.className = 'picked-dot ' + s;
        dotsEl.appendChild(d);
      });
      namesEl.textContent = picked.map(s => SENSE_LABELS[s]).join(' · ');
    }

    // ---------- Sense picker panel (input screen) ----------

    function syncSensePickerSelection() {
      // 현재 state.selectedSenses 기준으로 리스트 항목 selected 클래스 + aria-checked 갱신
      document.querySelectorAll('.sense-picker-item').forEach(el => {
        const isSelected = state.selectedSenses.has(el.dataset.sense);
        el.classList.toggle('selected', isSelected);
        el.setAttribute('aria-checked', isSelected ? 'true' : 'false');
      });
      // 확인 버튼 활성/비활성 — class + HTML disabled attribute 둘 다 갱신 (키보드 활성화 차단)
      const confirmBtn = document.getElementById('sense-picker-confirm');
      const isEmpty = state.selectedSenses.size === 0;
      confirmBtn.classList.toggle('disabled', isEmpty);
      confirmBtn.disabled = isEmpty;
    }

    function openSensePicker() {
      const panel  = document.getElementById('sense-picker');
      const toggle = document.getElementById('picked-toggle');
      const body   = document.getElementById('input-body');
      panel.removeAttribute('hidden');
      body.classList.add('dim');
      syncSensePickerSelection();
      // 다음 프레임에서 .open 클래스 + aria-expanded 동시 적용 — transition이 보이고 aria 상태가 실제 visible 상태와 정합
      requestAnimationFrame(() => {
        panel.classList.add('open');
        toggle.setAttribute('aria-expanded', 'true');
      });
    }

    // 내부 헬퍼: 가드 없이, transition 대기 없이 picker를 즉시 닫힌 상태로 리셋.
    // 화면 전환(btn-next) 같이 transition이 보일 필요가 없는 경로에서 사용. 단독 호출 시
    // closeSensePicker가 진입 가드와 transition 대기까지 함께 처리.
    function _forceClosePicker() {
      const panel  = document.getElementById('sense-picker');
      const toggle = document.getElementById('picked-toggle');
      const body   = document.getElementById('input-body');
      panel.classList.remove('open');
      panel.setAttribute('hidden', '');
      toggle.setAttribute('aria-expanded', 'false');
      body.classList.remove('dim');
    }

    function closeSensePicker() {
      // 0개 선택 시 닫기 금지 (모든 닫기 경로의 공통 가드)
      if (state.selectedSenses.size === 0) return;
      const panel = document.getElementById('sense-picker');
      const toggle = document.getElementById('picked-toggle');
      const body   = document.getElementById('input-body');
      panel.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
      body.classList.remove('dim');
      // transition 끝난 뒤 hidden 다시 부여 (display:none으로 layout 빼주기).
      // _forceClosePicker와 달리 transition이 보여야 하므로 .open만 먼저 떼고 hidden은 지연 부여.
      setTimeout(() => {
        if (!panel.classList.contains('open')) panel.setAttribute('hidden', '');
      }, 320);
    }

    function isSensePickerOpen() {
      return document.getElementById('sense-picker').classList.contains('open');
    }

    function toggleSenseInPicker(sense) {
      // 멀티 선택 토글. 마지막 1개 해제도 허용 (확인 버튼 비활성으로 닫기만 막음)
      if (state.selectedSenses.has(sense)) {
        state.selectedSenses.delete(sense);
      } else {
        state.selectedSenses.add(sense);
      }
      // 헤더의 dots + names 즉시 갱신 (펼친 상태에서도 결과가 헤더에 반영됨)
      renderPicked();
      // picker 리스트 selected + 확인 버튼 활성 상태 + aria-checked 갱신
      syncSensePickerSelection();
      // 홈 화면 동그라미들의 selected 클래스도 동기화 ("이전"으로 돌아갔을 때 일관성)
      document.querySelectorAll('.sense-circle').forEach(el => {
        el.classList.toggle('selected', state.selectedSenses.has(el.dataset.sense));
      });
    }

    function handlePhotoFile(file) {
      if (!file) return;
      state.photoBlob = file;
      const img = document.getElementById('photo-preview');
      if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
      img.src = URL.createObjectURL(file);
      document.getElementById('photo-frame').classList.add('has-photo');
    }

    function removePhoto() {
      state.photoBlob = null;
      const img = document.getElementById('photo-preview');
      if (img.src && img.src.startsWith('blob:')) URL.revokeObjectURL(img.src);
      img.removeAttribute('src');
      document.getElementById('photo-frame').classList.remove('has-photo');
      document.getElementById('photo-camera').value = '';
      document.getElementById('photo-album').value  = '';
    }

    function updateSaveButton() {
      const btn = document.getElementById('btn-save');
      const ready = state.text.trim().length > 0;
      btn.classList.toggle('enabled', ready);
    }

    function resetInputDraft() {
      state.text = '';
      state.photoBlob = null;
      document.getElementById('text-input').value = '';
      removePhoto();
      updateSaveButton();
    }

    function resetHome() {
      state.selectedSenses.clear();
      document.querySelectorAll('.sense-circle').forEach(el => el.classList.remove('selected'));
      updateHomeFooter();
    }

    // ---------- Screen 3 helpers ----------
    function renderDoneCluster() {
      document.querySelectorAll('.blend-circle').forEach(el => {
        el.classList.toggle('show', state.selectedSenses.has(el.dataset.sense));
      });
    }

    // ---------- Screen 4 helpers ----------
    function formatEntryTime(iso) {
      const d = new Date(iso);
      const month = d.getMonth() + 1;
      const date  = d.getDate();
      const hh    = d.getHours();
      const mm    = d.getMinutes();
      const am    = hh < 12;
      const h12   = ((hh + 11) % 12) + 1;
      return `${month}월 ${date}일 · ${am ? '오전' : '오후'} ${h12}:${String(mm).padStart(2, '0')}`;
    }

    // Track blob URLs created so we can free them on re-render
    let feedBlobUrls = [];
    function freeFeedBlobUrls() {
      feedBlobUrls.forEach(u => URL.revokeObjectURL(u));
      feedBlobUrls = [];
    }

    function buildEntryCard(e) {
      const card = document.createElement('article');
      card.className = 'entry-card';

      const head = document.createElement('header');
      head.className = 'entry-head';

      const time = document.createElement('span');
      time.className = 'entry-time';
      time.textContent = formatEntryTime(e.createdAt);
      head.appendChild(time);

      const dots = document.createElement('span');
      dots.className = 'entry-dots';
      (e.senses || []).forEach(s => {
        const d = document.createElement('span');
        d.className = 'picked-dot ' + s;
        dots.appendChild(d);
      });
      head.appendChild(dots);

      card.appendChild(head);

      if (e.photoBlob) {
        const img = document.createElement('img');
        img.className = 'entry-photo';
        const url = URL.createObjectURL(e.photoBlob);
        feedBlobUrls.push(url);
        img.src = url;
        img.alt = '';
        card.appendChild(img);
      }

      const p = document.createElement('p');
      p.className = 'entry-text';
      p.textContent = e.text;
      card.appendChild(p);

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'entry-delete';
      del.textContent = '지우기';
      del.addEventListener('click', () => deleteEntry(e.id));
      card.appendChild(del);

      return card;
    }

    async function deleteEntry(id) {
      if (!confirm('이 기록을 지울까요?')) return;
      const db = await openDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(id);
        tx.oncomplete = resolve;
        tx.onerror    = () => reject(tx.error);
      });
      // Refresh whichever tab is active
      if (!document.getElementById('calendar-view').hidden) {
        await renderCalendar();
      } else {
        await renderJournal();
      }
    }

    async function renderJournal() {
      const feed  = document.getElementById('entry-feed');
      const empty = document.getElementById('entry-empty');

      freeFeedBlobUrls();
      feed.innerHTML = '';

      const all = await getAllEntries();
      all.sort((a, b) => b.id - a.id);

      if (all.length === 0) {
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      all.forEach(e => feed.appendChild(buildEntryCard(e)));
    }

    // ---------- Calendar ----------
    const calState = {
      year:  new Date().getFullYear(),
      month: new Date().getMonth(),
      selectedDate: null  // 'YYYY-MM-DD' or null
    };

    function dateKey(year, monthIdx, day) {
      return `${year}-${String(monthIdx + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function buildCalThumb(entries) {
      const thumb = document.createElement('span');
      thumb.className = 'cal-thumb';

      if (!entries || entries.length === 0) {
        return thumb;  // empty square — keeps every cell the same height
      }

      // Prefer the latest entry with a photo; otherwise the latest entry's first sense.
      const sorted = entries.slice().sort((a, b) => b.id - a.id);
      const rep = sorted.find(e => e.photoBlob) || sorted[0];

      if (rep.photoBlob) {
        const img = document.createElement('img');
        const url = URL.createObjectURL(rep.photoBlob);
        feedBlobUrls.push(url);
        img.src = url;
        img.alt = '';
        thumb.appendChild(img);
      } else {
        const firstSense = (rep.senses || [])[0];
        if (firstSense) thumb.classList.add('blob-' + firstSense);
      }
      return thumb;
    }

    function monthKeyOf(year, monthIdx) {
      return `${year}-${String(monthIdx + 1).padStart(2, '0')}`;
    }

    function entriesInMonth(entries, year, monthIdx) {
      return entries.filter(e => {
        const d = new Date(e.createdAt);
        return d.getFullYear() === year && d.getMonth() === monthIdx;
      });
    }

    function topSenseCounts(entries, n) {
      const counts = {};
      entries.forEach(e => (e.senses || []).forEach(s => {
        counts[s] = (counts[s] || 0) + 1;
      }));
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, n);
    }

    function renderMonthSummaryLocal(monthEntries) {
      const sensesEl = document.getElementById('month-summary-senses');
      const card     = document.getElementById('month-summary');

      if (monthEntries.length === 0) {
        card.hidden = true;
        return;
      }
      card.hidden = false;

      sensesEl.innerHTML = '';
      topSenseCounts(monthEntries, 3).forEach(([sense, count]) => {
        const wrap = document.createElement('span');
        wrap.className = 'ms-sense';
        const dot = document.createElement('span');
        dot.className = 'picked-dot ' + sense;
        wrap.appendChild(dot);
        const label = document.createElement('span');
        label.textContent = `${SENSE_LABELS[sense] || sense} ${count}`;
        wrap.appendChild(label);
        sensesEl.appendChild(wrap);
      });

      // AI parts cleared here; Task 9 will populate them.
      document.getElementById('month-summary-keywords').textContent = '';
      document.getElementById('month-summary-oneline').textContent = '';
    }

    async function renderCalendar() {
      // Free any object URLs from a previous render BEFORE we start creating new ones.
      freeFeedBlobUrls();

      const all = await getAllEntries();
      const monthEntries = entriesInMonth(all, calState.year, calState.month);
      renderMonthSummaryLocal(monthEntries);

      // Background: AI keywords + oneLine. Render when ready.
      // Capture current month — if user navigates away, ignore the result.
      const renderYearAtStart  = calState.year;
      const renderMonthAtStart = calState.month;
      ensureMonthSummary(renderYearAtStart, renderMonthAtStart, monthEntries)
        .then(summary => {
          if (calState.year === renderYearAtStart &&
              calState.month === renderMonthAtStart) {
            renderMonthSummaryAi(summary);
          }
        });

      const byDay = {};
      all.forEach(e => {
        const d = new Date(e.createdAt);
        const key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
        (byDay[key] = byDay[key] || []).push(e);
      });

      document.getElementById('cal-month-label').textContent =
        `${calState.year}년 ${calState.month + 1}월`;

      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      const first        = new Date(calState.year, calState.month, 1);
      const startWeekday = first.getDay();
      const daysInMonth  = new Date(calState.year, calState.month + 1, 0).getDate();
      const prevLast     = new Date(calState.year, calState.month, 0).getDate();
      const today        = new Date();
      const todayKey     = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

      // Previous-month padding
      for (let i = startWeekday - 1; i >= 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'cal-cell outside';
        const num = document.createElement('span');
        num.className = 'cal-num';
        num.textContent = prevLast - i;
        cell.appendChild(num);
        cell.appendChild(buildCalThumb([]));
        grid.appendChild(cell);
      }

      // Current month
      for (let day = 1; day <= daysInMonth; day++) {
        const key = dateKey(calState.year, calState.month, day);
        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'cal-cell';
        if (key === todayKey) cell.classList.add('today');
        if (key === calState.selectedDate) cell.classList.add('selected');

        const num = document.createElement('span');
        num.className = 'cal-num';
        num.textContent = day;
        cell.appendChild(num);

        const entries = byDay[key] || [];
        if (entries.length > 0) cell.classList.add('has-content');
        cell.appendChild(buildCalThumb(entries));

        cell.addEventListener('click', () => {
          calState.selectedDate = (calState.selectedDate === key) ? null : key;
          renderCalendar();
        });

        grid.appendChild(cell);
      }

      // Next-month padding
      const remainder = (startWeekday + daysInMonth) % 7;
      if (remainder > 0) {
        for (let i = 1; i <= 7 - remainder; i++) {
          const cell = document.createElement('div');
          cell.className = 'cal-cell outside';
          const num = document.createElement('span');
          num.className = 'cal-num';
          num.textContent = i;
          cell.appendChild(num);
          cell.appendChild(buildCalThumb([]));
          grid.appendChild(cell);
        }
      }

      // Selected day's entries — DO NOT freeFeedBlobUrls here, the calendar
      // thumbnails above already added their URLs to feedBlobUrls.
      const dayContainer = document.getElementById('cal-day-entries');
      dayContainer.innerHTML = '';

      if (calState.selectedDate) {
        const [, mm, dd] = calState.selectedDate.split('-');
        const header = document.createElement('div');
        header.className = 'cal-day-header';
        header.textContent = `${parseInt(mm, 10)}월 ${parseInt(dd, 10)}일`;
        dayContainer.appendChild(header);

        const entries = (byDay[calState.selectedDate] || []).slice().sort((a, b) => b.id - a.id);
        if (entries.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'cal-no-entries';
          empty.textContent = '이 날의 기록이 없어요';
          dayContainer.appendChild(empty);
        } else {
          entries.forEach(e => dayContainer.appendChild(buildEntryCard(e)));
        }
      }
    }

    function setTab(name) {
      document.getElementById('tab-flow').classList.toggle('active',     name === 'flow');
      document.getElementById('tab-calendar').classList.toggle('active', name === 'calendar');
      document.getElementById('tab-diary').classList.toggle('active',    name === 'diary');
      document.getElementById('flow-view').hidden     = (name !== 'flow');
      document.getElementById('calendar-view').hidden = (name !== 'calendar');
      document.getElementById('diary-view').hidden    = (name !== 'diary');
      document.querySelector('.journal-body').classList.toggle('mode-calendar', name === 'calendar');
    }

    // ---------- Diary tab ----------
    function todayDateKey() {
      const d = new Date();
      return dateKey(d.getFullYear(), d.getMonth(), d.getDate());
    }

    function formatDiaryDate(key) {
      const [y, m, d] = key.split('-').map(Number);
      const days = ['일','월','화','수','목','금','토'];
      const wd = new Date(y, m - 1, d).getDay();
      return `${m}월 ${d}일 ${days[wd]}요일`;
    }

    function groupEntriesByDay(entries) {
      const map = new Map();
      entries.forEach(e => {
        const d = new Date(e.createdAt);
        const key = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(e);
      });
      return map;
    }

    function distinctSensesForDay(entries) {
      const seen = new Set();
      const out = [];
      entries.forEach(e => (e.senses || []).forEach(s => {
        if (!seen.has(s)) { seen.add(s); out.push(s); }
      }));
      return out;
    }

    function buildDiaryCard(dateKey, bodyText, senses) {
      const card = document.createElement('article');
      card.className = 'diary-card';

      const head = document.createElement('header');
      head.className = 'diary-head';
      const dateEl = document.createElement('span');
      dateEl.className = 'diary-date';
      dateEl.textContent = formatDiaryDate(dateKey);
      head.appendChild(dateEl);

      const dots = document.createElement('span');
      dots.className = 'diary-senses';
      senses.forEach(s => {
        const dot = document.createElement('span');
        dot.className = 'picked-dot ' + s;
        dots.appendChild(dot);
      });
      head.appendChild(dots);

      card.appendChild(head);

      const body = document.createElement('p');
      body.className = 'diary-body';
      body.textContent = bodyText;
      card.appendChild(body);

      return card;
    }

    async function renderDiaryTab() {
      const feed = document.getElementById('diary-feed');
      feed.innerHTML = '';

      const entries  = await getAllEntries();
      const diaries  = await getAllDiaries();
      const byDay    = groupEntriesByDay(entries);
      const diaryMap = new Map(diaries.map(d => [d.dateKey, d]));

      const today = todayDateKey();
      const todayEntries = byDay.get(today) || [];
      const todayDiary   = diaryMap.get(today);

      // --- Today slot ---
      if (todayEntries.length === 0 && !todayDiary) {
        const empty = document.createElement('div');
        empty.className = 'diary-empty';
        empty.innerHTML = '오늘은 아직 기록이 없어요.<br>홈에서 감각을 남기고 다시 와주세요.';
        feed.appendChild(empty);
      } else if (todayDiary) {
        const senses = distinctSensesForDay(todayEntries);
        const card = buildDiaryCard(today, todayDiary.text, senses);
        const rewrite = document.createElement('button');
        rewrite.type = 'button';
        rewrite.className = 'diary-rewrite';
        rewrite.textContent = '다시 쓰기';
        rewrite.addEventListener('click', () => rewriteTodayDiary());
        card.appendChild(rewrite);
        feed.appendChild(card);
      } else {
        const action = document.createElement('div');
        action.className = 'diary-today-action';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn-primary';
        btn.id = 'btn-generate-today';
        btn.textContent = '오늘 일기 쓰기';
        btn.addEventListener('click', () => generateTodayDiary());
        action.appendChild(btn);
        const hint = document.createElement('div');
        hint.className = 'diary-today-hint';
        hint.textContent = `오늘 감각 ${todayEntries.length}개를 모아 일기로 묶어요`;
        action.appendChild(hint);
        feed.appendChild(action);
      }

      // --- Past diaries (newest first, excluding today) ---
      const pastKeys = diaries
        .map(d => d.dateKey)
        .filter(k => k !== today)
        .sort((a, b) => b.localeCompare(a));
      pastKeys.forEach(k => {
        const diary = diaryMap.get(k);
        const senses = distinctSensesForDay(byDay.get(k) || []);
        feed.appendChild(buildDiaryCard(k, diary.text, senses));
      });
    }

    // ---------- Generate today's diary via Gemini ----------
    const DIARY_SYSTEM_PROMPT = [
      '너는 사용자가 하루 동안 남긴 짧은 감각 메모들을 보고,',
      '그 사람 본인이 쓴 것 같은 담담한 일기로 묶어주는 도우미야.',
      '',
      '규칙:',
      '- 어미는 ~이었다 / ~다 (담담한 1인칭)',
      '- 과장된 비유, 시적 표현, 감탄사 금지',
      '- 한 문단, 5~7문장',
      '- 메모에 없는 사실을 지어내지 말 것',
      '- 시간 순서가 자연스럽게 흐르게 묶기',
      '- 감각 이름(시각/청각 등)을 본문에 그대로 노출하지 말기',
      '',
      '오직 일기 본문만 출력해. 인사말, 머리말, 부연 설명 금지.'
    ].join('\n');

    function formatEntriesForPrompt(entries) {
      return entries
        .slice()
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt))
        .map(e => {
          const d = new Date(e.createdAt);
          const hh = String(d.getHours()).padStart(2, '0');
          const mm = String(d.getMinutes()).padStart(2, '0');
          const senses = (e.senses || []).map(s => SENSE_LABELS[s] || s).join('·');
          return `[${hh}:${mm} · ${senses}] ${e.text}`;
        })
        .join('\n');
    }

    async function generateTodayDiary(opts) {
      const force = !!(opts && opts.force);
      const dkey = todayDateKey();
      const entries = await getAllEntries();
      const todayEntries = entries.filter(e => {
        const d = new Date(e.createdAt);
        return dkey === dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      });

      if (todayEntries.length === 0) {
        alert('오늘 감각 기록이 아직 없어요.');
        return;
      }

      if (!getApiKey()) {
        openSettingsModal();
        return;
      }

      const fp = await fingerprintEntries(todayEntries);
      if (!force) {
        const existing = await getDiary(dkey);
        if (existing && existing.sourceFingerprint === fp) {
          await renderDiaryTab();
          return;
        }
      }

      const btn = document.getElementById('btn-generate-today');
      if (btn) { btn.disabled = true; btn.textContent = '쓰는 중…'; }

      try {
        const userText = formatEntriesForPrompt(todayEntries);
        const text = (await callGemini(DIARY_SYSTEM_PROMPT, userText)).trim();
        await putDiary({
          dateKey: dkey,
          text,
          generatedAt: new Date().toISOString(),
          sourceFingerprint: fp
        });
        await renderDiaryTab();
      } catch (err) {
        alert(geminiErrorMessage(err));
        if (btn) { btn.disabled = false; btn.textContent = '오늘 일기 쓰기'; }
        if (err && err.code === 'NO_KEY') openSettingsModal();
      }
    }

    async function rewriteTodayDiary() {
      if (!confirm('오늘 일기를 다시 쓸까요? 지금 글은 사라져요.')) return;
      await generateTodayDiary({ force: true });
    }

    // ---------- Month summary AI ----------
    const MONTH_SYSTEM_PROMPT = [
      '한 달치 감각 메모들을 보고 다음을 뽑아줘.',
      '오직 JSON만 답해. 다른 설명 일절 금지.',
      '',
      '{',
      '  "keywords": ["...", "...", "..."],',
      '  "oneLine": "..."',
      '}',
      '',
      '규칙:',
      '- keywords는 자주 보인 감정/분위기 명사 또는 명사형(따뜻함, 조용, 설렘 같은) 3~5개',
      '- oneLine은 과장 없이 담담하게 ~다 어미로 한 문장(25자 이내 권장)'
    ].join('\n');

    function tryParseSummaryJson(text) {
      try { return JSON.parse(text); } catch (_) {}
      const match = text.match(/\{[\s\S]*\}/);
      if (match) {
        try { return JSON.parse(match[0]); } catch (_) {}
      }
      return null;
    }

    async function ensureMonthSummary(year, monthIdx, monthEntries) {
      if (monthEntries.length === 0) return null;
      if (!getApiKey()) return null;  // Silent skip for background call

      const mk = monthKeyOf(year, monthIdx);
      const fp = await fingerprintEntries(monthEntries);
      const cached = await getMonthSummary(mk);
      if (cached && cached.fingerprint === fp) return cached;

      const userText = monthEntries
        .slice()
        .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt))
        .map(e => {
          const d = new Date(e.createdAt);
          const day = d.getDate();
          const senses = (e.senses || []).map(s => SENSE_LABELS[s] || s).join('·');
          return `${day}일 · ${senses} · ${e.text}`;
        })
        .join('\n');

      let parsed;
      try {
        const raw = await callGemini(MONTH_SYSTEM_PROMPT, userText);
        parsed = tryParseSummaryJson(raw);
      } catch (err) {
        return null;
      }
      if (!parsed || !Array.isArray(parsed.keywords) || typeof parsed.oneLine !== 'string') {
        return null;
      }

      const summary = {
        monthKey: mk,
        keywords: parsed.keywords.slice(0, 5).map(String),
        oneLine: parsed.oneLine.toString(),
        fingerprint: fp,
        generatedAt: new Date().toISOString()
      };
      await putMonthSummary(summary);
      return summary;
    }

    function renderMonthSummaryAi(summary) {
      const kw = document.getElementById('month-summary-keywords');
      const ol = document.getElementById('month-summary-oneline');
      if (!summary) {
        kw.textContent = '';
        ol.textContent = '';
        return;
      }
      kw.textContent = summary.keywords.length
        ? `"${summary.keywords.join(' · ')}"`
        : '';
      ol.textContent = summary.oneLine ? `"${summary.oneLine}"` : '';
    }

    async function enterJournal() {
      setTab('flow');
      await renderJournal();
    }

    async function saveAndShowDone() {
      const entry = {
        id: Date.now(),
        createdAt: new Date().toISOString(),
        senses: [...state.selectedSenses],
        photoBlob: state.photoBlob,
        text: state.text.trim()
      };
      try {
        await addEntry(entry);
      } catch (err) {
        alert('저장에 실패했어요: ' + err.message);
        return;
      }
      renderDoneCluster();
      const n = await getTodayCount();
      document.getElementById('done-sub').textContent = `오늘의 ${n}번째 감각`;
      showView('done');
    }

    // ---------- Init ----------
    function init() {
      renderDate();

      // Home: sense circles
      document.querySelectorAll('.sense-circle').forEach(el => {
        el.addEventListener('click', () => toggleSense(el.dataset.sense, el));
      });

      // Home → Journal (top-right link)
      document.getElementById('link-journal').addEventListener('click', async () => {
        await enterJournal();
        showView('journal');
      });

      // Home → Input
      document.getElementById('btn-next').addEventListener('click', () => {
        if (state.selectedSenses.size === 0) return;
        resetInputDraft();
        renderPicked();
        // sense picker는 항상 닫힌 상태로 진입 (이전 펼침 상태가 남아있지 않게)
        _forceClosePicker();
        showView('input');
      });

      // Sense picker: 헤더 탭으로 열기 / 헤더 재탭 또는 dim 본문 탭 또는 확인 버튼으로 닫기
      document.getElementById('picked-toggle').addEventListener('click', () => {
        if (isSensePickerOpen()) {
          closeSensePicker();
        } else {
          openSensePicker();
        }
      });

      // 펼침 패널의 각 항목 클릭 → 선택 토글
      document.querySelectorAll('.sense-picker-item').forEach(el => {
        el.addEventListener('click', () => toggleSenseInPicker(el.dataset.sense));
      });

      // 확인 버튼
      document.getElementById('sense-picker-confirm').addEventListener('click', closeSensePicker);

      // Input → Home
      document.getElementById('btn-back').addEventListener('click', () => {
        showView('home');
      });

      // Photo inputs
      document.getElementById('photo-camera').addEventListener('change', e => handlePhotoFile(e.target.files[0]));
      document.getElementById('photo-album').addEventListener('change',  e => handlePhotoFile(e.target.files[0]));
      document.getElementById('photo-remove').addEventListener('click', removePhoto);

      // Text input
      document.getElementById('text-input').addEventListener('input', e => {
        state.text = e.target.value;
        updateSaveButton();
      });

      // Save → IndexedDB → Done screen
      document.getElementById('btn-save').addEventListener('click', saveAndShowDone);

      // Done → Home (fresh)
      document.getElementById('btn-to-home').addEventListener('click', () => {
        resetHome();
        showView('home');
      });

      // Done → Journal
      document.getElementById('btn-to-journal').addEventListener('click', async () => {
        resetHome(); // clear home selection so returning home is fresh
        await enterJournal();
        showView('journal');
      });

      // Bottom nav (Journal screen)
      document.getElementById('nav-home').addEventListener('click', () => {
        resetHome();
        showView('home');
      });
      document.getElementById('nav-journal').addEventListener('click', enterJournal);

      // Journal tabs
      document.getElementById('tab-flow').addEventListener('click', async () => {
        setTab('flow');
        await renderJournal();
      });
      document.getElementById('tab-calendar').addEventListener('click', async () => {
        setTab('calendar');
        await renderCalendar();
      });
      document.getElementById('tab-diary').addEventListener('click', async () => {
        setTab('diary');
        await renderDiaryTab();
      });

      // Calendar month nav
      function goPrevMonth() {
        calState.month--;
        if (calState.month < 0) { calState.month = 11; calState.year--; }
        calState.selectedDate = null;
        renderCalendar();
      }
      function goNextMonth() {
        calState.month++;
        if (calState.month > 11) { calState.month = 0; calState.year++; }
        calState.selectedDate = null;
        renderCalendar();
      }
      document.getElementById('cal-prev').addEventListener('click', goPrevMonth);
      document.getElementById('cal-next').addEventListener('click', goNextMonth);

      // Calendar horizontal swipe (mobile) — left=next, right=prev
      const calGridEl = document.getElementById('cal-grid');
      let calTouchStart = null;
      calGridEl.addEventListener('touchstart', e => {
        const t = e.touches[0];
        calTouchStart = { x: t.clientX, y: t.clientY };
      }, { passive: true });
      calGridEl.addEventListener('touchend', e => {
        if (!calTouchStart) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - calTouchStart.x;
        const dy = t.clientY - calTouchStart.y;
        calTouchStart = null;
        // Must be mostly horizontal and at least 50px
        if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx > 0) goPrevMonth();
        else        goNextMonth();
      }, { passive: true });

      // Settings modal
      document.getElementById('btn-settings').addEventListener('click', openSettingsModal);
      document.getElementById('settings-close').addEventListener('click', closeSettingsModal);
      document.getElementById('settings-save').addEventListener('click', saveApiKey);
      document.getElementById('settings-clear').addEventListener('click', clearApiKey);
      document.getElementById('settings-overlay').addEventListener('click', e => {
        if (e.target.id === 'settings-overlay') closeSettingsModal();
      });
    }

    init();
  </script>
</body>
</html>
